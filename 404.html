<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samir Yasar</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0a0814" />
  <link rel="icon" type="image/png" href="assets/logo_favicon.png" />
  <link rel="apple-touch-icon" href="assets/logo_favicon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
    }
    .error-page__code {
      font-family: var(--serif);
      font-size: clamp(6rem, 15vw, 12rem);
      font-weight: 400;
      line-height: 1;
      background: linear-gradient(135deg, var(--soar), var(--soar-2), var(--sirat-2), var(--sirat));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 24px;
      filter: drop-shadow(0 0 26px rgba(178, 100, 255, 0.35));
    }
    .error-page__msg {
      font-family: var(--serif);
      font-size: clamp(1.3rem, 3vw, 2rem);
      font-weight: 400;
      margin: 0 0 12px;
    }
    .error-page__sub {
      color: var(--text-dim);
      margin: 0 0 40px;
      max-width: 380px;
    }
    .error-page__links {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <canvas class="bg-canvas" id="bgCanvas" aria-hidden="true"></canvas>
  <div class="cyber-grid" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>
  <div class="glow" id="glow" aria-hidden="true"></div>

  <div class="error-page">
    <div class="error-page__code reveal">404</div>
    <h1 class="error-page__msg reveal">Page not found</h1>
    <p class="error-page__sub reveal">The page you're looking for doesn't exist or has been moved.</p>
    <div class="error-page__links reveal">
      <a href="index.html" class="link-arrow">Go home <span>&rarr;</span></a>
      <a href="soar.html" class="link-arrow c-soar-hover">Soar <span>&rarr;</span></a>
      <a href="sirat.html" class="link-arrow c-sirat-hover">Sirat <span>&rarr;</span></a>
      <a href="roadmap.html" class="link-arrow">Roadmap <span>&rarr;</span></a>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
